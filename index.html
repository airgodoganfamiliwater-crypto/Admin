<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="index.css">
<meta name="theme-color" content="#2563eb">
<link rel="icon" href="ikon-512.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<title>Input Admin Cabang</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>

<body>

<div class="header">
  <button class="btn-analisa" onclick="openAnalisa()">
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M3 3h2v18H3V3zm4 10h2v8H7v-8zm4-6h2v14h-2V7zm4 4h2v10h-2V11zm4-8h2v18h-2V3z"/>
    </svg>
  </button>
</div>
<div id="popupAnalisa" class="popup-bg" onclick="closeAnalisa(event)">
  <div class="popup-card" onclick="event.stopPropagation()">

    <h3>Akses Analisa</h3>

    <input type="password" id="passwordAnalisa" placeholder="Masukkan password">

    <button id="btnLoginAnalisa" onclick="cekPassword()">
      Masuk
    </button>

  </div>
</div>
<div class="container">
  <div class="card">
    <!-- TANGGAL -->
    <div class="date-box">
      <input type="date" id="tanggal">
      <span class="date-icon">📆</span>
      <span class="date-placeholder">Pilih tanggal dulu</span>
    </div>
    
    <label>Jumlah Klien</label>
    <div class="row">
      <input inputmode="numeric" id="klien" placeholder="Manaf">
      <input id="payKlien" readonly placeholder="Otomatis (Rp)">
    </div>
    
    <label>Jumlah Sales</label>
    <div class="row">
      <input inputmode="numeric" id="sales" placeholder="Ikin">
      <input id="paySales" inputmode="numeric" placeholder="Isi manual (Rp)">
    </div>

    <!-- PENGELUARAN (DIUBAH DI SINI SAJA) -->
    <h3>Pengeluaran</h3>
    
    <div class="pengeluaran-row gas">
      <span>
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 2a2 2 0 0 0-2 2v14a4 4 0 0 0 8 0V4a2 2 0 0 0-2-2H6zm0 2h4v6H6V4zm10.5 2-.5.5V13a2.5 2.5 0 1 0 5 0V9.5l-1.5-1.5-1.5 1.5V13a.5.5 0 1 1-1 0V6z"/>
        </svg>
        Gas
      </span>
      <input inputmode="numeric" id="gasHarga" placeholder="Rp">
    </div>
    
    <div class="pengeluaran-row tutup">
      <span>
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 6h18v2H3V6zm2 4h14v10H5V10zm4 2v6h2v-6H9zm4 0v6h2v-6h-2z"/>
        </svg>
        Tutup
      </span>
      <input inputmode="numeric" id="tutupHarga" placeholder="Rp">
    </div>
    
    <div class="pengeluaran-row bensin">
      <span>
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M16 3H6a2 2 0 0 0-2 2v14h10V5a2 2 0 0 0-2-2zm0 2v4H6V5h10zm3 3 2 2v6a2 2 0 1 1-4 0v-3h2v3a.5.5 0 1 0 1 0v-5l-2-2h1z"/>
        </svg>
        Bensin
      </span>
      <input inputmode="numeric" id="bensinHarga" placeholder="Rp">
    </div>
    
    <div class="pengeluaran-row listrik">
      <span>
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M13 2 3 14h7v8l10-12h-7l0-8z"/>
        </svg>
        Listrik
      </span>
      <input inputmode="numeric" id="listrik" placeholder="Rp">
    </div>

    <!-- LAINNYA -->
    <div id="lainnyaBox"></div>
    <button class="btn-add" onclick="tambahLainnya()">
      ➕ Tambah Pengeluaran Lain
    </button>

    <!-- TOTAL -->
    <h3>Total Uang</h3>
    <input id="totalProfit" readonly placeholder="Hasil otomatis">

    <!-- SUBMIT -->
    <div class="btn-group">
      <button class="btn-primary" onclick="kirim()">✅ Kirim</button>
      <button class="btn-secondary" onclick="location.href='riwayat.html'">📊 Riwayat</button>
    </div>

  </div>
</div>

<!-- POPUP -->
<div id="popup" class="popup-bg">
  <div class="popup-card">
    <p id="popupText"></p>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<script src="index.js"></script>

</body>
</html>
