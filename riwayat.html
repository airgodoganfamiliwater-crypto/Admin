<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
<link rel="icon" href="ikon-512.png">
<title>Riwayat Input Admin Cabang</title>

<style>
:root{
  --primary:#2563eb;
  --primary-soft:#dbeafe;
  --danger:#ef4444;
  --bg:#f8fafc;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e5e7eb;
  --radius:18px;
  --fontSize:14px;
}
html{font-size:var(--fontSize);}
body, input, textarea, button, label, h1, h2, h3, h4, h5, h6, small, div, span {
  font-size:1rem !important;
}
*{box-sizing:border-box;font-family:'Nunito',sans-serif;user-select:none;outline:none;}

body{
  margin:0;
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
}
.header{
  height:220px;
  background:var(--primary);
  border-radius:0 0 32px 32px;
}
.container{
  padding:0 16px 32px;
  margin-top:-150px;
}
.card{
  max-width:700px;
  margin:auto;
  background:white;
  padding:16px;
  border-radius:18px;
  border:1px solid var(--border);
  box-shadow:0 10px 25px rgba(0,0,0,.06);
}
.item{
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  margin-bottom:12px;
  background:white;
}
.line{margin:3px 0}
.bold{font-weight:bold}
.small{color:#64748b}
.btn{
  padding:12px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:white;
  font-weight:bold;
  width:100%;
  margin-bottom:10px;
}
.summary{
  margin-top:12px;
  padding:14px;
  border-radius:14px;
  background:#f1f5f9;
  border:1px solid #e5e7eb;
  font-weight:bold;
  text-align:center;
}
</style>
</head>

<body>
<div class="header"></div>
<div class="container">

<div class="card">

<h2>Riwayat</h2>

<button class="btn" onclick="location.href='index.html'">Input Baru</button>

<div id="list"></div>

<div id="summaryTotal" class="summary">
  Total Profit: Rp 0
</div>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyCl13_a4x-BQnWNUjf9JOQX1DKc-HxLBys",
  authDomain:"klien-39696.firebaseapp.com",
  projectId:"klien-39696"
});

const auth = firebase.auth();
const db = firebase.firestore();
const list = document.getElementById("list");
const summaryTotal = document.getElementById("summaryTotal");

function rupiah(n){
  return "Rp "+(Number(n)||0).toLocaleString("id-ID");
}

function formatTanggal(str){
  if(!str) return "-";
  const d = new Date(str);
  return d.toLocaleDateString("id-ID", {
    weekday:"long",
    day:"numeric",
    month:"long",
    year:"numeric"
  });
}

auth.onAuthStateChanged(async user=>{
  if(!user) return location.href="login.html";
  loadData(user.uid);
});

async function loadData(uid){
  const snap = await db.collection("inputAdmin")
    .where("adminUID","==",uid)
    .get();

  if(snap.empty){
    list.innerHTML="<p class='small'>Belum ada data</p>";
    return;
  }

  const now = new Date();
  const currentMonth = now.getMonth();
  const currentYear = now.getFullYear();

  let arr = [];
  snap.forEach(d=>{
    const data = d.data();
    if(data.tanggal){
      const t = new Date(data.tanggal);
      if(t.getMonth() === currentMonth && t.getFullYear() === currentYear){
        arr.push(data);
      }
    }
  });

  if(arr.length === 0){
    list.innerHTML="<p class='small'>Belum ada data bulan ini</p>";
    summaryTotal.innerHTML="";
    return;
  }

  arr.sort((a,b)=>(b.tanggal||"").localeCompare(a.tanggal||""));

  list.innerHTML="";
  let totalAll=0;

  arr.forEach(d=>{
    totalAll += Number(d.totalProfit)||0;

    const p = d.pengeluaran || {};
    const lainnya = (p.lainnya || [])
      .map(x=>`${x.keterangan}: ${rupiah(x.harga)}`)
      .join("<br>");

    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <div class="line bold">📅 ${formatTanggal(d.tanggal)}</div>

      <hr>

      <div class="line">Klien: <b>${d.klien||0}</b></div>
      <div class="line">Pembayaran Klien: <b>${rupiah(d.pembayaranKlien)}</b></div>

      <div class="line">Sales: <b>${d.sales||0}</b></div>
      <div class="line">Pembayaran Sales: <b>${rupiah(d.pembayaranSales)}</b></div>

      <hr>

      <div class="line bold">Pengeluaran:</div>
      <div class="line">Gas: ${rupiah(p.gas)}</div>
      <div class="line">Tutup: ${rupiah(p.tutup)}</div>
      <div class="line">Bensin: ${rupiah(p.bensin)}</div>
      <div class="line">Listrik: ${rupiah(p.listrik)}</div>

      ${lainnya ? `<div class="line bold">Lainnya:</div><div class="line small">${lainnya}</div>` : ""}

      <div class="line bold">Total Pengeluaran: ${rupiah(p.totalPengeluaran)}</div>

      <hr>

      <div class="line bold">💰 Total Profit: ${rupiah(d.totalProfit)}</div>
    `;
    list.appendChild(div);
  });

  summaryTotal.innerHTML = `Total Profit:<br><span style="font-size:1.3em">${rupiah(totalAll)}</span>`;
}
</script>

</body>
</html>
