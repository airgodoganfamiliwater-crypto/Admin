<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
<link rel="icon" href="ikon-512.png">
<title>Login Admin Cabang</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>
  .bg-falling{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:3;
  }
  
  .bg-falling img{
    position:absolute;
    top:-120px;
    object-fit:cover;
    animation-name: fall;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
    will-change: transform, opacity;
    transform: translateZ(0);
  }
  @keyframes fall{
    from{
      transform: translate3d(0,-120px,0) rotate(0deg);
      opacity:0;
    }
    to{
      transform:
        translate3d(var(--drift),120vh,0)
        rotate(var(--rotate));
      opacity:.2;
    }
  }
:root{
  --primary:#2563eb;
  --primary-soft:#dbeafe;
  --bg:#f8fafc;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --danger:#ef4444;
  --border:#e5e7eb;
  --radius:18px;
}
  @keyframes fadeInUp{
    from{
      opacity:0;
      transform: translateY(20px);
    }
    to{
      opacity:1;
      transform: translateY(0);
    }
  }
*{box-sizing:border-box;font-family:Arial}
body{
  margin:0;
  background:var(--bg);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:var(--card);
  padding:24px;
  width:100%;
  max-width:360px;
  border-radius:var(--radius);
  border:1px solid var(--border);
  box-shadow:0 10px 30px rgba(0,0,0,.08);
  animation: fadeInUp .6s ease both;
}
  .logo-wrapper{
    display:flex;
    justify-content:center;
    margin-bottom:14px;
  }
  
  .logo-fw{
    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;
    animation: spinOnce 1s ease forwards;
  }
  
  /* animasi muter sekali */
  @keyframes spinOnce{
    from{ transform:rotate(0deg) scale(.8); opacity:0; }
    to{ transform:rotate(360deg) scale(1); opacity:1; }
  }
  body.theme-future .logo-fw{
    filter:
      drop-shadow(0 0 12px rgba(34,211,238,.6))
      drop-shadow(0 0 28px rgba(34,211,238,.35));
  }

  h2{
    text-align:center;
    margin-bottom:20px;
    color:var(--primary);
  }


/* PIN BOX */
.pin-box{
  display:flex;
  justify-content:space-between;
  gap:8px;
  margin:16px 0;
}
.pin-box input{
  width:48px;
  height:56px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  border-radius:12px;
  border:1px solid var(--danger);
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:var(--primary);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
button:active{transform:scale(.97)}

/* POPUP */
.popup-bg{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  display:none;
  justify-content:center;
  align-items:center;
}
.popup-card{
  background:white;
  padding:20px;
  border-radius:16px;
  width:300px;
  text-align:center;
}
.popup-card p{margin-bottom:14px}
.popup-card button{background:var(--primary)}
</style>
</head>

<body>
<div class="bg-falling"></div>
<div class="card">
  <div class="logo-wrapper">
    <img src="logofw.png" alt="Logo FW" class="logo-fw">
  </div>
  <h2>Login Admin</h2>

  <!-- EMAIL HIDDEN & PATEN -->
  <input id="email" type="hidden" value="itamustopabayur@gmail.com">

  <div class="pin-box">
    <input maxlength="1" class="pin" type="password">
    <input maxlength="1" class="pin" type="password">
    <input maxlength="1" class="pin" type="password">
    <input maxlength="1" class="pin" type="password">
    <input maxlength="1" class="pin" type="password">
    <input maxlength="1" class="pin" type="password">
  </div>

  <button onclick="login()">Login</button>
</div>

<!-- POPUP -->
<div id="popup" class="popup-bg">
  <div class="popup-card">
    <p id="popupText"></p>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<script>
// Firebase Config
firebase.initializeApp({
 apiKey: "AIzaSyCl13_a4x-BQnWNUjf9JOQX1DKc-HxLBys",
    authDomain: "klien-39696.firebaseapp.com",
    projectId: "klien-39696",
});
const auth=firebase.auth();
const db=firebase.firestore();

// Popup
function showPopup(msg){
  popupText.innerText=msg;
  popup.style.display="flex";
}
function closePopup(){
  popup.style.display="none";
}

// PIN AUTO MOVE
const pins=document.querySelectorAll(".pin");
pins.forEach((input,i)=>{
  input.addEventListener("input",()=>{
    if(input.value && i<pins.length-1){
      pins[i+1].focus();
    }
  });
  input.addEventListener("keydown",e=>{
    if(e.key==="Backspace" && !input.value && i>0){
      pins[i-1].focus();
    }
  });
});

// LOGIN
async function login(){
  const email=document.getElementById("email").value;
  let password="";
  pins.forEach(p=>password+=p.value);

  if(password.length<6){
    showPopup("Masukkan 6 digit PIN");
    return;
  }

  try{
    const res=await auth.signInWithEmailAndPassword(email,password);
    const uid=res.user.uid;

    const doc=await db.collection("adminCabang").doc(uid).get();
    if(!doc.exists){
      showPopup("Akun tidak terdaftar admin cabang");
      auth.signOut();
      return;
    }

    const data=doc.data();
    if(data.role!=="admin_cabang"){
      showPopup("Role tidak diizinkan");
      auth.signOut();
      return;
    }
    if(data.status!=="approved"){
      showPopup("Akun belum disetujui pusat");
      auth.signOut();
      return;
    }

    localStorage.setItem("adminCabang","true");
    localStorage.setItem("adminCabangName",data.nama);
    localStorage.setItem("adminCabangID",data.id);

    showPopup("Login berhasil...");
    setTimeout(()=>location.href="index.html",1200);

  }catch(err){
    showPopup("Login gagal: "+err.message);
  }
}
  /*LOGO JATUH*/
    const bg = document.querySelector(".bg-falling");
    let TOTAL_LOGO = 13; // ✅ pakai let
    /*JIKA HP KENTANG*/
    if (navigator.hardwareConcurrency && navigator.hardwareConcurrency <= 4) {
      TOTAL_LOGO = 7;
    }

  for(let i = 0; i < TOTAL_LOGO; i++){
    const img = document.createElement("img");
    img.src = "logo.png";
  
    const size = Math.random() * 40 + 25;
    const left = Math.random() * 100;
    const duration = Math.random() * 12 + 8;
    const delay = Math.random() * -20;
    const drift = (Math.random() * 120 - 60) + "px";
    const rotate = (Math.random() * 720 - 360) + "deg";
  
    img.style.width = size + "px";
    img.style.left = left + "%";
    img.style.animationDuration = duration + "s";
    img.style.animationDelay = delay + "s";
  
    // 🌌 OPACITY ACAK (LETANYA DI SINI)
    img.style.opacity = Math.random() * 0.15 + 0.05;
  
    img.style.setProperty("--drift", drift);
    img.style.setProperty("--rotate", rotate);
  
    bg.appendChild(img);
  }
  /* 🔥 MATIKAN ANIMASI SAAT TAB TIDAK AKTIF */
  document.addEventListener("visibilitychange", () => {
  bg.style.display = document.hidden ? "none" : "block";
  });
    // PWA 
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('✅ Service Worker registered'))
        .catch(err => console.error('❌ Service Worker failed:', err));
    });
  }
</script>

</body>
</html>
